name: customer-support-triage-v1
version: "1.0.0"
description: "A real-world OpenEnv environment where AI agents manage customer support tickets for a SaaS company. Agents classify tickets, assign priority, route to departments, and compose professional replies."

tasks:
  - id: task1
    name: "Ticket Classification"
    difficulty: easy
    description: "Classify incoming support tickets into the correct category: billing, technical, account, general, or feature_request"

  - id: task2
    name: "Priority and Routing"
    difficulty: medium
    description: "Assign urgency priority and route tickets to the correct support department"

  - id: task3
    name: "Full Ticket Resolution"
    difficulty: hard
    description: "Classify, prioritize, route, and write a complete customer response for complex tickets"

observation_space:
  type: object
  properties:
    ticket:
      type: object
    task_id:
      type: string
    task_description:
      type: string
    current_ticket_index:
      type: integer
    total_tickets:
      type: integer
    current_step:
      type: integer
    max_steps:
      type: integer
    completed_actions:
      type: array
    score_so_far:
      type: number
    valid_action_types:
      type: array
    context:
      type: object

action_space:
  type: object
  properties:
    action_type:
      type: string
      enum: [classify, prioritize, route, respond, skip]
    category:
      type: string
      enum: [billing, technical, account, general, feature_request]
    priority:
      type: string
      enum: [urgent, high, medium, low]
    department:
      type: string
      enum: [billing_team, tech_support, account_management, general_support]
    response_text:
      type: string

reward:
  type: number
  min: -0.2
  max: 1.0

endpoints:
  reset:
    method: POST
    path: /reset

  step:
    method: POST
    path: /step

  state:
    method: GET
    path: /state